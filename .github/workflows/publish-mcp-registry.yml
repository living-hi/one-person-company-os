name: Publish MCP Registry

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/publish-mcp-registry.yml"
      - "platforms/mcp-server/**"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  packages: write

env:
  IMAGE_NAME: ghcr.io/living-hi/one-person-company-os-mcp
  SERVER_JSON: platforms/mcp-server/server.json

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Read version
        id: meta
        run: |
          version="$(jq -r '.version' "$SERVER_JSON")"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push MCP image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: platforms/mcp-server/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
            ${{ env.IMAGE_NAME }}:latest
          labels: |
            io.modelcontextprotocol.server.name=io.github.living-hi/one-person-company-os
            org.opencontainers.image.source=https://github.com/living-hi/one-person-company-os
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}

      - name: Install MCP publisher
        run: |
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
          sudo mv mcp-publisher /usr/local/bin/mcp-publisher
          mcp-publisher --help

      - name: Authenticate to MCP Registry with GitHub OIDC
        run: mcp-publisher login github-oidc

      - name: Publish to Official MCP Registry
        run: mcp-publisher publish "$SERVER_JSON"
