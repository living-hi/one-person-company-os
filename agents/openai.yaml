interface:
  display_name: "One Person Company OS"
  short_description: "面向 AI 一人公司的可导航、可落盘、可交付 company operating system，支持一句话创业引导与可视化 DOCX 交付看板"
  default_prompt: "我正在创立一间 AI 一人公司，请帮我调用 one-person-company-os。先别让我填很多表，先主动问我一句创业想法；如果我没想好，就给我 3 到 4 个方向建议让我选。然后做 Step 1/5 到 Step 3/5，给我公司创建草案，并告诉我当前内容有没有保存、我接下来该看哪个路径。"
